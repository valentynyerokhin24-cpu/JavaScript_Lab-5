<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <h1>DOM Interaction</h1>
        
        <div class="input-section">
            <input type="text" id="userInput" placeholder="Напишіть щось...">
            <button id="btnText">Оновити текст</button>
        </div>

        <div class="input-section">
            <input type="text" id="htmlInput" placeholder="<b>Тег</b> або текст...">
            <button id="btnHTML">Оновити HTML</button>
        </div>

        <div class="results">
            <p>Результат textContent: <span id="resText">...</span></p>
            <p>Результат innerHTML: <span id="resHTML">...</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
